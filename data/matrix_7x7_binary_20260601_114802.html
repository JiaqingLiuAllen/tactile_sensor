.257216,2.395824,2.252381,2.307179,2.229817,2.175824,2.234652,2.224982,2.370037,2.231429,2.131502,2.15326,2.155678,2.23304,2.148425,2.191135,2.17663,2.2,2.187106,2.206447,2.145201,2.164542,2.270916,2.09685,2.127472,2.104908,2.146813,2.208059,2.114579,2.245934],"t":4.384},{"timestamp":"2026-06-01T11:48:06.581","values":[2.381319,2.367619,2.308791,2.360366,2.345055,2.338608,2.385348,2.524762,2.492527,2.452235,2.507033,2.483663,2.444176,2.54652,2.332967,2.309597,2.154066,2.245128,2.320879,2.257216,2.398242,2.266081,2.307985,2.236264,2.171795,2.229011,2.227399,2.372454,2.234652,2.12989,2.121831,2.161319,2.231429,2.150842,2.191941,2.175018,2.2,2.1863,2.200806,2.14359,2.162124,2.262857,2.062198,2.127472,2.105714,2.179853,2.204835,2.121831,2.247546],"t":4.392},{"timestamp":"2026-06-01T11:48:06.594","values":[2.386154,2.369231,2.307179,2.378095,2.345055,2.335385,2.383736,2.524762,2.494945,2.456264,2.486887,2.481245,2.446593,2.543297,2.335385,2.31282,2.154066,2.248352,2.320073,2.261245,2.404689,2.266081,2.306374,2.245128,2.179853,2.229011,2.228205,2.37326,2.224176,2.12989,2.15326,2.157289,2.233846,2.152454,2.208059,2.185494,2.201612,2.181465,2.218535,2.141172,2.158095,2.265275,2.061392,2.127472,2.131502,2.175824,2.204835,2.113773,2.248352],"t":4.401},{"timestamp":"2026-06-01T11:48:06.608","values":[2.378901,2.367619,2.310403,2.374066,2.345055,2.334579,2.383736,2.530403,2.494945,2.461099,2.488498,2.461905,2.446593,2.543297,2.328938,2.320073,2.15326,2.245128,2.337802,2.264469,2.397436,2.27011,2.306374,2.245934,2.183077,2.230623,2.225787,2.371648,2.221758,2.130696,2.154066,2.149231,2.23304,2.150037,2.188718,2.178242,2.199194,2.183883,2.204029,2.141172,2.161319,2.266886,2.032381,2.128278,2.107326,2.174212,2.188718,2.108132,2.248352],"t":4.41},{"timestamp":"2026-06-01T11:48:06.608","values":[2.387766,2.34989,2.307985,2.370842,2.345055,2.33619,2.385348,2.522344,2.498974,2.461099,2.489304,2.482857,2.4337,2.543297,2.334579,2.312015,2.164542,2.264469,2.322491,2.258828,2.392601,2.270916,2.303956,2.244322,2.183077,2.230623,2.218535,2.366007,2.229011,2.125055,2.15326,2.158901,2.239487,2.148425,2.19033,2.179853,2.199194,2.187912,2.229011,2.136337,2.159707,2.264469,2.060586,2.127472,2.10652,2.174212,2.202418,2.113773,2.247546],"t":4.419}]};
    const rows = DATA.rows;
    const cols = DATA.cols;
    const vmin = DATA.vmin;
    const vmax = DATA.vmax;
    const unit = DATA.unit || "V";
    const heatmap = document.getElementById("heatmap");
    const heatCtx = heatmap.getContext("2d");
    const bars = document.getElementById("bars");
    const barCtx = bars.getContext("2d");
    const slider = document.getElementById("slider");
    const playBtn = document.getElementById("playBtn");
    const speedSelect = document.getElementById("speed");
    const readout = document.getElementById("readout");
    const meta = document.getElementById("meta");

    let frameIndex = 0;
    let playing = false;
    let timer = null;

    slider.max = Math.max(DATA.frames.length - 1, 0);
    meta.textContent = `${DATA.source_name} | ${DATA.frames.length} frames | duration ${DATA.duration_sec.toFixed(3)} s | nominal ${DATA.nominal_fps.toFixed(1)} fps`;

    function clamp(value, lo, hi) {
      return Math.max(lo, Math.min(hi, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function colorFor(value) {
      const t = clamp((value - vmin) / (vmax - vmin || 1), 0, 1);
      let r, g, b;
      if (t < 0.5) {
        const k = t / 0.5;
        r = 255;
        g = lerp(0, 230, k);
        b = 0;
      } else {
        const k = (t - 0.5) / 0.5;
        r = lerp(255, 0, k);
        g = lerp(230, 160, k);
        b = 0;
      }
      return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
    }

    function shadeColor(rgb, factor) {
      const nums = rgb.match(/\d+/g).map(Number);
      return `rgb(${nums.map(v => Math.round(clamp(v * factor, 0, 255))).join(",")})`;
    }

    function drawHeatmap(frame) {
      const pad = 46;
      const grid = Math.min(heatmap.width - pad * 1.5, heatmap.height - pad * 1.5);
      const cell = grid / rows;
      const x0 = pad;
      const y0 = pad * 0.65;
      heatCtx.clearRect(0, 0, heatmap.width, heatmap.height);
      heatCtx.font = "12px -apple-system, BlinkMacSystemFont, sans-serif";
      heatCtx.textAlign = "center";
      heatCtx.textBaseline = "middle";

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const value = frame.values[r * cols + c];
          const x = x0 + c * cell;
          const y = y0 + r * cell;
          heatCtx.fillStyle = colorFor(value);
          heatCtx.fillRect(x, y, cell, cell);
          heatCtx.strokeStyle = "rgba(255,255,255,0.85)";
          heatCtx.strokeRect(x, y, cell, cell);
          heatCtx.fillStyle = "#111827";
          heatCtx.fillText(value.toFixed(2), x + cell / 2, y + cell / 2);
        }
      }

      heatCtx.fillStyle = "#334e68";
      for (let c = 0; c < cols; c++) {
        heatCtx.fillText(`C${c + 1}`, x0 + c * cell + cell / 2, y0 + grid + 18);
      }
      for (let r = 0; r < rows; r++) {
        heatCtx.fillText(`R${r + 1}`, x0 - 18, y0 + r * cell + cell / 2);
      }
    }

    function project(col, row) {
      const originX = 318;
      const originY = 340;
      const stepX = 42;
      const stepY = 22;
      return {
        x: originX + (col - row) * stepX,
        y: originY + (col + row) * stepY * 0.55
      };
    }

    function drawBar(base, width, depth, height, color) {
      const topY = base.y - height;
      barCtx.fillStyle = shadeColor(color, 0.78);
      barCtx.beginPath();
      barCtx.moveTo(base.x - width / 2, base.y);
      barCtx.lineTo(base.x + width / 2, base.y);
      barCtx.lineTo(base.x + width / 2, topY);
      barCtx.lineTo(base.x - width / 2, topY);
      barCtx.closePath();
      barCtx.fill();

      barCtx.fillStyle = shadeColor(color, 0.60);
      barCtx.beginPath();
      barCtx.moveTo(base.x + width / 2, base.y);
      barCtx.lineTo(base.x + width / 2 + depth, base.y - depth * 0.55);
      barCtx.lineTo(base.x + width / 2 + depth, topY - depth * 0.55);
      barCtx.lineTo(base.x + width / 2, topY);
      barCtx.closePath();
      barCtx.fill();

      barCtx.fillStyle = color;
      barCtx.beginPath();
      barCtx.moveTo(base.x - width / 2, topY);
      barCtx.lineTo(base.x + width / 2, topY);
      barCtx.lineTo(base.x + width / 2 + depth, topY - depth * 0.55);
      barCtx.lineTo(base.x - width / 2 + depth, topY - depth * 0.55);
      barCtx.closePath();
      barCtx.fill();

      barCtx.strokeStyle = "rgba(15,23,42,0.18)";
      barCtx.strokeRect(base.x - width / 2, topY, width, height);
    }

    function drawBars(frame) {
      barCtx.clearRect(0, 0, bars.width, bars.height);
      barCtx.font = "11px -apple-system, BlinkMacSystemFont, sans-serif";
      barCtx.textAlign = "center";
      barCtx.textBaseline = "bottom";

      const maxBarHeight = 150;
      const barWidth = 23;
      const barDepth = 16;
      const ordered = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ordered.push({r, c, order: r + c});
        }
      }
      ordered.sort((a, b) => a.order - b.order);

      for (const cell of ordered) {
        const value = frame.values[cell.r * cols + cell.c];
        const h = clamp((value - vmin) / (vmax - vmin || 1), 0, 1) * maxBarHeight;
        const base = project(cell.c, cell.r);
        const color = colorFor(value);
        drawBar(base, barWidth, barDepth, h, color);
        barCtx.fillStyle = "#111827";
        barCtx.fillText(value.toFixed(2), base.x + barDepth / 2, base.y - h - barDepth * 0.55 - 3);
      }

      barCtx.fillStyle = "#334e68";
      barCtx.textBaseline = "middle";
      barCtx.fillText("Voltage bars", bars.width / 2, 22);
    }

    function render(index) {
      frameIndex = clamp(index, 0, DATA.frames.length - 1);
      const frame = DATA.frames[frameIndex];
      drawHeatmap(frame);
      drawBars(frame);
      slider.value = frameIndex;
      readout.innerHTML = [
        `frame ${frameIndex + 1}/${DATA.frames.length}`,
        `t=${frame.t.toFixed(3)}s`,
        frame.timestamp ? frame.timestamp : "",
        `min=${Math.min(...frame.values).toFixed(3)} ${unit}`,
        `max=${Math.max(...frame.values).toFixed(3)} ${unit}`
      ].filter(Boolean).map(s => `<span>${s}</span>`).join("");
    }

    function playNext() {
      if (!playing) return;
      if (frameIndex >= DATA.frames.length - 1) {
        playing = false;
        playBtn.textContent = "Play";
        return;
      }
      render(frameIndex + 1);
      const speed = Number(speedSelect.value) || 1;
      timer = setTimeout(playNext, Math.max(1, DATA.frame_interval_ms / speed));
    }

    playBtn.addEventListener("click", () => {
      playing = !playing;
      playBtn.textContent = playing ? "Pause" : "Play";
      if (playing) playNext();
      else if (timer) clearTimeout(timer);
    });
    document.getElementById("prevBtn").addEventListener("click", () => render(frameIndex - 1));
    document.getElementById("nextBtn").addEventListener("click", () => render(frameIndex + 1));
    slider.addEventListener("input", () => render(Number(slider.value)));

    render(0);
  </script>
